services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noop_cloud
      POSTGRES_USER: noop
      POSTGRES_PASSWORD: noop
    ports:
      - "55432:5432"
    volumes:
      - noop-cloud-postgres:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - .:/work:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noop -d noop_cloud"]
      interval: 2s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
    environment:
      DATABASE_URL: postgres://noop:noop@postgres:5432/noop_cloud
      PORT: 8787
      TOKEN_HASH_PEPPER: local-dev-only-change-me
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  noop-cloud-postgres:
